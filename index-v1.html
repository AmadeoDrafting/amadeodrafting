<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amadeo Drafting & Design</title>

<style>

html,body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
color:#222;
}

/* NAVBAR */

.navbar{
width:100%;
background:#f5f5f5;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
z-index:1000;
}

.navbar-inner{
max-width:1400px;
margin:auto;
padding:25px 60px;

display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
height:40px;
}

.logo img{
height:90%;
object-fit:contain;
transform:translateY(10px);
}

.menu{
display:flex;
gap:40px;
font-size:14px;
}

.menu a{
text-decoration:none;
color:#333;
transition:0.2s;
}

.menu a:hover{
color:#ff4d00;
}

.menu a.active{
color:#ff4d00;
border-bottom:2px solid #ff4d00;
padding-bottom:6px;
}
  
.lang{
border:1px solid #ddd;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

/* HERO */

.hero{
min-height:80vh;
display:flex;
align-items:center;

max-width:1400px;
margin:auto;
padding:0 60px;
}

.hero-content{
max-width:550px;
}

.hero h1{
font-size:64px;
font-weight:500;
line-height:1.1;
margin:0;
}

.dot{
display:inline-block;
width:14px;
height:14px;
background:#ff4d00;
border-radius:50%;
margin-left:8px;
}

/* BUTTONS */

.buttons{
margin-top:40px;
display:flex;
gap:20px;
}

.btn-dark{
background:#111;
color:white;
padding:14px 26px;
border-radius:25px;
text-decoration:none;
font-size:14px;
transition:0.2s;
}

.btn-dark:hover{
background:#333;
}

.btn-light{
border:1px solid #ccc;
padding:14px 26px;
border-radius:25px;
text-decoration:none;
font-size:14px;
color:#333;
background:white;
transition:0.2s;
}

.btn-light:hover{
border-color:#ff4d00;
color:#ff4d00;
}

/* BOTTOM BAR */

.bottom-bar{
max-width:1400px;
margin:20px auto;
padding:18px 60px;

display:flex;
justify-content:space-between;

font-size:11px;
letter-spacing:2px;
color:#777;

border-top:1px solid #e5e5e5;
border-bottom:1px solid #e5e5e5;

text-transform:uppercase;
}

/* FOOTER */

.footer{
max-width:1400px;
margin:0 auto;
padding:80px 60px;
}

.footer-grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:60px;
}

.footer-left h2{
font-size:40px;
font-weight:500;
line-height:1.2;
margin-bottom:30px;
}

.footer-title{
font-size:11px;
letter-spacing:2px;
color:#777;
margin-bottom:20px;
}

.footer-text{
font-size:14px;
margin-bottom:8px;
}

.footer-links a{
display:block;
text-decoration:none;
color:#333;
font-size:14px;
margin-bottom:8px;
transition:0.2s;
}

.footer-links a:hover{
color:#ff4d00;
}

/* FOOTER META */

.footer-meta{
max-width:1400px;
margin:40px auto;
padding:0 60px;

display:flex;
justify-content:space-between;

font-size:11px;
letter-spacing:2px;
color:#777;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div id="navbar"></div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>
Precision that<br>
takes shape<span class="dot"></span>
</h1>

<div class="buttons">

<a href="portfolio.html" class="btn-dark">
Portfolio →
</a>

<a href="#" class="btn-light">
Request a quote
</a>

</div>

</div>

</section>

<div id="footer"></div>

<script>

fetch("navbar.html")
.then(response => response.text())
.then(data => {

document.getElementById("navbar").innerHTML = data;

const links = document.querySelectorAll(".menu a");

let current = window.location.pathname.split("/").pop();

if(current === "" || current === "/"){
current = "index.html";
}

links.forEach(link => {

const href = link.getAttribute("href");

if(href === current){
link.classList.add("active");
}

});

});

fetch("footer.html")
.then(response => response.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});

</script>
  
</body>

</html>
