<script>

/* language storage */

let lang = localStorage.getItem("lang") || "en";

/* translations */

const translations = {

en:{
portfolio:"Portfolio",
services:"Services",
about:"About",
quote:"Get a quote"
},

fr:{
portfolio:"Portfolio",
services:"Services",
about:"À propos",
quote:"Demander un devis"
}

};


/* apply language */

function applyLanguage(){

document.querySelectorAll("[data-key]").forEach(el=>{

const key = el.getAttribute("data-key");

el.innerText = translations[lang][key];

});

document.getElementById("lang-switch").innerText =
lang === "en" ? "FR" : "EN";

}


/* switch language */

document.getElementById("lang-switch").onclick = function(){

lang = lang === "en" ? "fr" : "en";

localStorage.setItem("lang", lang);

applyLanguage();

};


/* initialize */

applyLanguage();

</script>
