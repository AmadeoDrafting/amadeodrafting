<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amadeo Drafting & Design</title>

<style>

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

body{
padding-left:20px;
padding-right:20px;
}

.hero{
height:auto;
min-height:100vh;
}

.logo{
width:300px;
}

.hero h1{
font-size:18px;
letter-spacing:1px;
margin-top:-20px;
}

.hero p{
font-size:14px;
}

.buttons{
flex-direction:column;
gap:18px;
margin-top:20px;
}

.btn{
width:240px;
margin:auto;
}

.navbar{
top:20px;
padding:10px 18px;
}

.navbar a{
margin:0 8px;
font-size:14px;
}

}

/* ---------------- GENERAL ---------------- */

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
color:#333;

background:
linear-gradient(rgba(255,255,255,0.45), rgba(255,255,255,0.45)),
url("Fondo.png");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* NAVBAR */

.navbar{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:rgba(20,20,20,0.85);
padding:12px 35px;
border-radius:40px;
backdrop-filter:blur(8px);
z-index:1000;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
font-size:15px;
}

.navbar a:hover{
color:#f39c12;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:90px;
}

/* LOGO */

.logo{
width:560px;
margin-bottom:20px;
}

/* TITLE */

.hero h1{
font-size:24px;
letter-spacing:2px;
margin:-100px 0 10px 0;
font-weight:500;
color:#555;
}

/* SUBTITLE */

.hero p{
font-size:16px;
color:#666;
margin-bottom:25px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:25px;
margin-top:10px;
}

.btn{
background:#111;
color:white;
padding:14px 30px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:all 0.3s ease;
box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

@media (min-width:769px){

.btn:hover{
background:#f39c12;
transform:translateY(-4px);
box-shadow:0 14px 28px rgba(0,0,0,0.35);
}

}

/* CONTACT */

.contact{
background:#222;
color:white;
padding:30px;
font-size:18px;
margin-top:120px;
}

/* POPUPS */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:2000;
}

.popup-image{
max-width:90%;
max-height:90%;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.close{
position:absolute;
top:40px;
right:60px;
font-size:40px;
color:white;
cursor:pointer;
}

/* FORM POPUP */

.form-popup{
background:white;
padding:40px;
border-radius:20px;
max-width:600px;
width:90%;
box-shadow:0 30px 60px rgba(0,0,0,0.4);
}

.project-form{
display:flex;
flex-direction:column;
gap:15px;
margin-top:20px;
}

.project-form input,
.project-form textarea,
.project-form select{
padding:14px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
font-family:Arial, sans-serif;
}

.project-form textarea{
min-height:130px;
resize:vertical;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
<a href="#home">Home</a>
<a href="javascript:void(0)" onclick="openProject()">Start a Project</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->

<section id="home" class="hero">

<img src="Logo.png" class="logo" alt="Amadeo">

<h1>ENGINEERING DESIGN & DRAFTING SUPPORT</h1>

<p>Shop Drawings • Fabrication Drawings • 3D Modeling</p>

<div class="buttons">

<a href="javascript:void(0)" class="btn" onclick="openProject()">START A PROJECT</a>

<a href="javascript:void(0)" class="btn" onclick="openPortfolio()">VIEW PORTFOLIO</a>

</div>

</section>

<!-- PORTFOLIO POPUP -->

<div id="portfolioPopup" class="popup">

<span class="close" onclick="closePortfolio()">×</span>

<img src="Landing.jpeg" class="popup-image">

</div>

<!-- PROJECT POPUP -->

<div id="projectPopup" class="popup">

<span class="close" onclick="closeProject()">×</span>

<div class="form-popup">

<h2>Start a Project</h2>

<form action="https://formspree.io/f/yourcode" method="POST" enctype="multipart/form-data" class="project-form">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="text" name="company" placeholder="Company">

<select name="service" required>
<option value="">Type of Service</option>
<option>Shop Drawings</option>
<option>3D Modeling</option>
<option>Structural Drafting</option>
<option>Product Design</option>
</select>

<input type="text" name="deadline" placeholder="Project Deadline">

<textarea name="project" placeholder="Tell me about your project..." required></textarea>

<label style="text-align:left;font-size:14px;">Attach drawings or reference files</label>

<input type="file" name="attachment" multiple>

<button type="submit" class="btn">SEND PROJECT</button>

</form>

</div>

</div>

<!-- CONTACT -->

<div id="contact" class="contact">

Juan Jaimes
+1 514-667-5563
[juan.jaimes.co@amadeodrafting.com](mailto:juan.jaimes.co@amadeodrafting.com)

</div>

<script>

function openPortfolio(){
document.getElementById("portfolioPopup").style.display="flex";
}

function closePortfolio(){
document.getElementById("portfolioPopup").style.display="none";
}

function openProject(){
document.getElementById("projectPopup").style.display="flex";
}

function closeProject(){
document.getElementById("projectPopup").style.display="none";
}

window.onclick = function(event){

let portfolio=document.getElementById("portfolioPopup");
let project=document.getElementById("projectPopup");

if(event.target==portfolio){
portfolio.style.display="none";
}

if(event.target==project){
project.style.display="none";
}

}

</script>

</body>
</html>
