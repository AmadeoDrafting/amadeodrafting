/* GENERAL */

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
color:#333;

background:
linear-gradient(rgba(255,255,255,0.45), rgba(255,255,255,0.45)),
url("Fondo.png");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:90px;
}

/* LOGO */

.logo{
width:560px;
margin-bottom:20px;
}

/* TITLE */

.hero h1{
font-size:24px;
letter-spacing:2px;
margin:-100px 0 10px 0;
font-weight:500;
color:#555;
}

/* SUBTITLE */

.hero p{
font-size:16px;
color:#666;
margin-bottom:25px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:25px;
margin-top:10px;
}

.btn{
background:#111;
color:white;
padding:14px 30px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:all 0.3s ease;
box-shadow:0 8px 18px rgba(0,0,0,0.25);
border:none;
cursor:pointer;
}

.btn:hover{
background:#f39c12;
transform:translateY(-4px);
}

/* IMAGE CAROUSEL */

.projects-carousel{
width:100%;
overflow:hidden;
margin-top:80px;
}

.carousel-track{
display:flex;
gap:40px;
width:max-content;
animation:scroll 30s linear infinite;
}

.carousel-track img{
height:140px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* CONTACT */

.contact{
background:#222;
color:white;
padding:30px;
font-size:18px;
margin-top:120px;
}

</style>
