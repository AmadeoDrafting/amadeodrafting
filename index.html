/* GENERAL */

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
color:#333;

background:
linear-gradient(rgba(255,255,255,0.45), rgba(255,255,255,0.45)),
url("Fondo.png");

background-size:cover;
background-position:center;
background-attachment:scroll;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:60px;
}

/* LOGO */

.logo{
width:560px;
margin-bottom:20px;
}

/* TITLE */

.hero h1{
font-size:24px;
letter-spacing:2px;
margin:-100px 0 10px 0;
font-weight:500;
color:#555;
}

/* SUBTITLE */

.hero p{
font-size:16px;
color:#666;
margin-bottom:25px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:25px;
margin-top:10px;
}

.btn{
background:#4a4a4a;
color:white;
padding:14px 30px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:all 0.3s ease;
box-shadow:0 8px 18px rgba(0,0,0,0.25);
border:none;
cursor:pointer;
}

.btn:hover{
background:#f39c12;
transform:translateY(-4px);
}

/* IMAGE BAND */

.projects-carousel{
width:100%;
overflow:hidden;
margin-top:80px;
}

.carousel-track{
display:flex;
gap:40px;
width:max-content;
animation:scroll 30s linear infinite;
}

.carousel-track img{
height:180px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* CONTACT */

.contact{
background:transparent;
color:#333;
padding:30px;
font-size:18px;
margin-top:60px;
}

/* POPUPS */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:2000;
}

.popup-image{
max-width:90%;
max-height:90%;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.close{
position:absolute;
top:40px;
right:60px;
font-size:40px;
color:white;
cursor:pointer;
}

/* FORM POPUP */

.form-popup{
background:white;
padding:40px;
border-radius:20px;
max-width:600px;
width:90%;
box-shadow:0 30px 60px rgba(0,0,0,0.4);
}

.project-form{
display:flex;
flex-direction:column;
gap:15px;
margin-top:20px;
}

.project-form input,
.project-form textarea,
.project-form select{
padding:14px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
font-family:Arial, sans-serif;
}

.project-form textarea{
min-height:130px;
resize:vertical;
}

</style>

<script>

function openPortfolio(){
document.getElementById("portfolioPopup").style.display="flex";
}

function closePortfolio(){
document.getElementById("portfolioPopup").style.display="none";
}

function openProject(){
document.getElementById("projectPopup").style.display="flex";
}

function closeProject(){
document.getElementById("projectPopup").style.display="none";
}

function openPayment(){
document.getElementById("paymentPopup").style.display="flex";
}

function closePayment(){
document.getElementById("paymentPopup").style.display="none";
}

function payInvoice(){

let invoice=document.getElementById("invoiceNumber").value;
let amount=document.getElementById("amount").value;

if(!invoice || !amount){
alert("Please enter invoice number and amount");
return;
}

window.open("https://buy.stripe.com/dRm4gz8rTb2213o6Yk04804","_blank");

}

window.onclick=function(event){

let portfolio=document.getElementById("portfolioPopup");
let project=document.getElementById("projectPopup");
let payment=document.getElementById("paymentPopup");

if(event.target==portfolio){portfolio.style.display="none";}
if(event.target==project){project.style.display="none";}
if(event.target==payment){payment.style.display="none";}

}

</script>
