<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amadeo Drafting & Design</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<div id="navbar"></div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>
<span data-key="hero_line1">Precision that</span><br>
<span data-key="hero_line2">takes shape</span><span class="dot"></span>
</h1>

<div class="buttons">

<a href="portfolio.html" class="btn-dark" data-key="portfolio_btn">
Portfolio →
</a>

<a href="#" class="btn-light" data-key="quote_btn">
Request a quote
</a>

</div>

</div>

</section>

<div id="footer"></div>

<script>

fetch("navbar.html")
.then(response => response.text())
.then(data => {

  document.getElementById("navbar").innerHTML = data;

  let lang = localStorage.getItem("lang") || "en";

  const translations = {
    en: {
      bottom_text_1: "ENGINEERING DESIGN · MECHANICAL DRAFTING · 3D MODELING",
      bottom_text_2: "MONTRÉAL · SERVING CANADA",
      footer_line1: "Precision that",
      footer_line2: "takes shape",
      footer_quote: "Request a quote →",
      contact: "CONTACT",
      links: "LINKS",
      made_in: "MADE IN MONTRÉAL",
      hero_line1: "Precision that",
      hero_line2: "takes shape",
      portfolio_btn: "Portfolio →",
      quote_btn: "Request a quote"
      
    },
    fr: {
      bottom_text_1: "CONCEPTION MÉCANIQUE · DESSIN TECHNIQUE · MODÉLISATION 3D",
      bottom_text_2: "MONTRÉAL · AU SERVICE DU CANADA",
      footer_line1: "La précision qui",
      footer_line2: "prend forme",
      footer_quote: "Demander un devis →",
      contact: "CONTACT",
      links: "LIENS",
      made_in: "FAIT À MONTRÉAL",
      hero_line1: "La précision qui",
      hero_line2: "prend forme",
      portfolio_btn: "Portfolio →",
      quote_btn: "Demander un devis"
    }
  };

  function applyLanguage(){
    document.querySelectorAll("[data-key]").forEach(el=>{
      const key = el.getAttribute("data-key");
      if(translations[lang][key]){
        el.innerText = translations[lang][key];
      }
    });
  }

  applyLanguage();

const btn = document.getElementById("lang-switch");


  /* MENU HAMBURGUESA */
  const toggle = document.querySelector(".menu-toggle");
  const mobileMenu = document.getElementById("mobileMenu");

  let abierto = false;

  if(toggle && mobileMenu){
    toggle.addEventListener("click", function(){
      if(window.innerWidth <= 768){
        mobileMenu.style.display = abierto ? "none" : "flex";
        abierto = !abierto;
      }
    });
  }

  const links = document.querySelectorAll(".menu a");

  let current = window.location.pathname.split("/").pop();

  if(current === "" || current === "/"){
    current = "index.html";
  }

  links.forEach(link => {
    if(link.getAttribute("href") === current){
      link.classList.add("active");
    }
  });

});

fetch("footer.html")
.then(response => response.text())
.then(data => {
  document.getElementById("footer").innerHTML = data;

  // 🔥 aplicar idioma también al footer
  if(typeof applyLanguage === "function"){
    applyLanguage();
  }
});

</script>
  
</body>

</html>
