<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Amadeo Drafting & Design</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
color:#222;
}

/* NAVBAR */

.navbar{
width:100%;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:1000;
}

.navbar-inner{
max-width:1400px;
margin:auto;
padding:25px 60px;

display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
height:40px;
}

.logo img{
height:90%;
object-fit:contain;
transform:translateY(10px);
}

.menu{
display:flex;
gap:40px;
font-size:14px;
}

.menu a{
text-decoration:none;
color:#333;
transition:0.2s;
}

.menu a:hover{
color:#ff4d00;
}

.menu a.active{
color:#ff4d00;
border-bottom:2px solid #ff4d00;
padding-bottom:6px;
}

.lang{
border:1px solid #ddd;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

/* PORTFOLIO HEADER */

.portfolio-header{
padding:120px;
}

.small-title{
letter-spacing:3px;
font-size:12px;
color:#777;
margin-bottom:20px;
}

.portfolio-header h1{
font-size:72px;
font-weight:500;
margin:0;
}

.orange{
color:#ff4d00;
}

.subtitle{
margin-top:20px;
color:#666;
max-width:500px;
}

/* SERVICES LIST */

.services-list{
padding:0 120px 60px 120px;
}

.service{
display:flex;
align-items:center;
justify-content:space-between;
padding:30px 0;
border-bottom:1px solid #ddd;
cursor:pointer;
transition:0.3s;
}

.service:hover{
background:#fafafa;
}

.service-number{
color:#999;
width:60px;
}

.service-title{
font-size:22px;
font-weight:500;
flex:1;
}

.service-projects{
color:#999;
font-size:14px;
}

/* QUOTE BUTTON */

.quote-btn{
padding:60px 120px;
}

.btn-dark{
background:#111;
color:white;
padding:16px 28px;
border-radius:30px;
text-decoration:none;
font-size:14px;
display:inline-block;
}

.btn-dark:hover{
background:#333;
}

</style>

</head>

<body>

<!-- NAVBAR LOAD -->

<div id="navbar"></div>

<!-- HEADER -->

<section class="portfolio-header">

<div class="small-title">SELECTED WORK</div>

<h1>
Work, by <span class="orange">specialty.</span>
</h1>

<p class="subtitle">
Click a service to see recent drawings and models delivered under that category.
</p>

</section>

<!-- SERVICES -->

<section class="services-list">

<div class="service">
<div class="service-number">01</div>
<div class="service-title">Shop drawings</div>
<div class="service-projects">04 projects +</div>
</div>

<div class="service">
<div class="service-number">02</div>
<div class="service-title">3D modeling — SolidWorks</div>
<div class="service-projects">04 projects +</div>
</div>

<div class="service">
<div class="service-number">03</div>
<div class="service-title">Structural steel drafting</div>
<div class="service-projects">04 projects +</div>
</div>

<div class="service">
<div class="service-number">04</div>
<div class="service-title">Furniture & millwork</div>
<div class="service-projects">02 projects +</div>
</div>

</section>

<!-- CTA -->

<div class="quote-btn">
<a href="#" class="btn-dark">Request a quote →</a>
</div>

<!-- LOAD NAVBAR SCRIPT -->

<script>

fetch("navbar.html")
.then(response => response.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});

</script>

</body>
</html>
