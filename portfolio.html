<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Amadeo Drafting & Design</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
color:#222;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:white;
border-bottom:1px solid #eee;
}

.logo{
display:flex;
align-items:center;
height:40px;
}

.logo img{
height:90%;
object-fit:contain;
transform:translateY(12px);
}

.menu{
display:flex;
gap:40px;
font-size:14px;
}

.menu a{
text-decoration:none;
color:#333;
transition:0.3s;
}

.menu a:hover{
color:#ff4d00;
}

.menu a.active{
color:#ff4d00;
border-bottom:2px solid #ff4d00;
padding-bottom:6px;
}

.lang{
border:1px solid #ddd;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

/* PORTFOLIO HEADER */

.portfolio-header{
padding:120px;
}

.small-title{
letter-spacing:3px;
font-size:12px;
color:#777;
margin-bottom:20px;
}

.portfolio-header h1{
font-size:72px;
font-weight:500;
margin:0;
}

.orange{
color:#ff4d00;
}

.subtitle{
margin-top:20px;
color:#666;
max-width:500px;
}

/* PROJECT GRID */

.projects{
padding:0 120px 120px 120px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.projects img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.projects img:hover{
transform:scale(1.03);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<a href="index.html">
<img src="Logo.png" alt="Amadeo Drafting & Design">
</a>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="portfolio.html" class="active">Portfolio</a>
<a href="#">Services</a>
<a href="#">About</a>
<a href="#">Get a quote</a>
</div>

<div class="lang">
FR
</div>

</div>

<!-- HEADER -->

<section class="portfolio-header">

<div class="small-title">SELECTED WORK</div>

<h1>
Work, by <span class="orange">specialty.</span>
</h1>

<p class="subtitle">
Click a service to see recent drawings and models delivered under that category.
</p>

</section>

<!-- PROJECTS -->

<section class="projects">

<img src="project1.jpg">
<img src="project2.jpg">
<img src="project3.jpg">
<img src="project4.jpg">
<img src="project5.jpg">
<img src="project6.jpg">

</section>

</body>

</html>
